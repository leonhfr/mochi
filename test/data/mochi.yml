sync:
  - path: german/vocabulary
    template: german
  - path: .
    name: Notes (root)
    parser: note
    archive: true
    walk: true

ignore:
  - journal/*

templates:
  german:
    parser: vocabulary
    templateId: xxxxxxxx
    fields:
      aaaaaaaa: word
      bbbbbbbb: examples
      cccccccc: notes
