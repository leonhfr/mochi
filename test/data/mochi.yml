sync:
  - path: german/vocabulary
    template: german
    archive: false
  - path: .
    name: Notes (root)
    parser: note
    walk: true
  - path: german/grammar
    parser: note

ignore:
  - journal/*

templates:
  german:
    parser: vocabulary
    templateId: xxxxxxxx
    fields:
      aaaaaaaa: word
      bbbbbbbb: examples
      cccccccc: notes
